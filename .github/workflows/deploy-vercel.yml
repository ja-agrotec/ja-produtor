name: Deploy to Vercel (production)

# Substitui o webhook nativo GitHub->Vercel, que nao funciona no plano Hobby
# para repositorio PRIVADO de ORGANIZACAO. Faz o deploy de producao a cada
# push na main usando a Vercel CLI + VERCEL_TOKEN (secret do repo).
#
# Estrategia: 'vercel deploy --prod' (build REMOTO na Vercel), nao prebuilt.
# Isso replica o build nativo com o env de producao completo e evita o bug de
# envs "sensitive" nao voltarem no 'vercel pull' (quebrava com Invalid URL).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-prod
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to production (Vercel builda remotamente)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
