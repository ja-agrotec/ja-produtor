name: Deploy to Vercel (production)

# Substitui o webhook nativo GitHub->Vercel, que nao funciona no plano Hobby
# para repositorio PRIVADO de ORGANIZACAO. Faz o deploy de producao a cada
# push na main usando a Vercel CLI + VERCEL_TOKEN (secret do repo).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-prod
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
